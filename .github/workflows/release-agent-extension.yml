name: Release BrowserOS Extension

on:
  push:
    tags:
      - "agent-extension/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, e.g. agent-extension/v0.0.100
        required: true
        type: string

concurrency:
  group: release-agent-extension
  cancel-in-progress: false

jobs:
  authorize_manual_dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: release-core
    steps:
      - run: echo "Manual dispatch approved through release-core."

  release:
    needs: authorize_manual_dispatch
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' || needs.authorize_manual_dispatch.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: packages/browseros-agent/apps/app

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: Resolve release metadata
        id: release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          PACKAGE_JSON="packages/browseros-agent/apps/app/package.json"
          NEW_PREFIX="agent-extension/v"
          LEGACY_PREFIX="agent-extension-v"

          is_semver() {
            [[ "$1" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          }

          emit() {
            printf '%s=%s\n' "$1" "$2"
            printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }

          git fetch origin "$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH" --no-tags
          git fetch origin --tags --prune

          VERSION="${RELEASE_TAG#"$NEW_PREFIX"}"
          if [ "$RELEASE_TAG" = "$VERSION" ] || ! is_semver "$VERSION"; then
            echo "::error::Expected extension release tag like ${NEW_PREFIX}X.Y.Z, got: $RELEASE_TAG"
            exit 1
          fi

          TAG_TYPE="$(git cat-file -t "refs/tags/$RELEASE_TAG" 2>/dev/null || true)"
          if [ -z "$TAG_TYPE" ]; then
            echo "::error::Tag does not exist: $RELEASE_TAG"
            exit 1
          fi
          if [ "$TAG_TYPE" != "tag" ]; then
            echo "::error::Tag $RELEASE_TAG must be an annotated tag."
            exit 1
          fi

          RELEASE_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"
          if ! PACKAGE_VERSION="$(
            git show "$RELEASE_SHA:$PACKAGE_JSON" | python3 -c '
          import json
          import sys

          print(json.load(sys.stdin)["version"])
          '
          )"; then
            echo "::error::Could not read $PACKAGE_JSON version from $RELEASE_TAG ($RELEASE_SHA)"
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "::error::$PACKAGE_JSON at $RELEASE_TAG is $PACKAGE_VERSION, expected $VERSION. Bump package.json before tagging."
            exit 1
          fi

          if ! git merge-base --is-ancestor "$RELEASE_SHA" "origin/$DEFAULT_BRANCH"; then
            echo "::error::Tagged commit $RELEASE_SHA is not reachable from origin/$DEFAULT_BRANCH."
            exit 1
          fi

          PREVIOUS_RESULT="$(
            python3 - "$VERSION" "$RELEASE_TAG" "$NEW_PREFIX" "$LEGACY_PREFIX" <<'PY'
          import re
          import subprocess
          import sys

          target = tuple(int(part) for part in sys.argv[1].split("."))
          target_tag = sys.argv[2]
          prefixes = sys.argv[3:]
          latest = None
          duplicate = None

          for tag in subprocess.check_output(["git", "tag", "-l"], text=True).splitlines():
              if tag == target_tag:
                  continue

              for prefix in prefixes:
                  if not tag.startswith(prefix):
                      continue
                  version = tag[len(prefix):]
                  if not re.fullmatch(r"(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)", version):
                      continue
                  parsed = tuple(int(part) for part in version.split("."))
                  if parsed == target:
                      duplicate = tag
                  if latest is None or parsed > latest[0]:
                      latest = (parsed, tag)

          if duplicate:
              print(f"duplicate={duplicate}")
          elif latest and target <= latest[0]:
              print(f"non_incrementing={'.'.join(str(part) for part in latest[0])}:{latest[1]}")
          elif latest:
              print(f"previous={latest[1]}")
          PY
          )"

          PREVIOUS_TAG=""
          case "$PREVIOUS_RESULT" in
            duplicate=*)
              DUPLICATE_TAG="${PREVIOUS_RESULT#duplicate=}"
              echo "::error::Release version $VERSION already exists as tag $DUPLICATE_TAG."
              exit 1
              ;;
            non_incrementing=*)
              LATEST="${PREVIOUS_RESULT#non_incrementing=}"
              LATEST_VERSION="${LATEST%%:*}"
              LATEST_TAG="${LATEST#*:}"
              echo "::error::Release version $VERSION must be greater than latest existing extension version $LATEST_VERSION ($LATEST_TAG)."
              exit 1
              ;;
            previous=*)
              PREVIOUS_TAG="${PREVIOUS_RESULT#previous=}"
              ;;
            "")
              ;;
            *)
              echo "::error::Unexpected previous tag resolver output: $PREVIOUS_RESULT"
              exit 1
              ;;
          esac

          emit version "$VERSION"
          emit tag "$RELEASE_TAG"
          emit release_sha "$RELEASE_SHA"
          emit previous_tag "$PREVIOUS_TAG"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          Extension release:
          - Version: ${VERSION}
          - Tag: ${RELEASE_TAG}
          - Release commit: ${RELEASE_SHA}
          - Package path: ${PACKAGE_JSON}

          Maintainer release flow:
          1. Bump packages/browseros-agent/apps/app/package.json in a PR and merge it.
          2. git tag -a agent-extension/v${VERSION} -m "agent-extension v${VERSION}"
          3. git push origin agent-extension/v${VERSION}
          EOF
        working-directory: packages/browseros-agent

      - name: Checkout release commit
        run: git checkout --detach "${{ steps.release.outputs.release_sha }}"
        working-directory: ${{ github.workspace }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci
        working-directory: packages/browseros-agent

      - name: Build and zip extension
        run: bun run codegen && bun run zip
        env:
          VITE_PUBLIC_BROWSEROS_API: https://api.browseros.com

      - name: Get zip path
        id: artifact
        run: |
          set -euo pipefail
          ZIP_FILE=$(find "$(pwd)/dist" -maxdepth 1 -type f -name '*-chrome.zip' | sort | sed -n '1p')
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::No Chrome extension zip found in $(pwd)/dist"
            exit 1
          fi
          echo "zip_path=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename "$ZIP_FILE")" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          AGENT_PATH="packages/browseros-agent/apps/app"
          RELEASE_SHA="${{ steps.release.outputs.release_sha }}"
          PREV_TAG="${{ steps.release.outputs.previous_tag }}"

          if [ -z "$PREV_TAG" ]; then
            echo "Initial release" > /tmp/release-notes.md
          else
            COMMITS=$(git log "$PREV_TAG..$RELEASE_SHA" --pretty=format:"%H" -- "$AGENT_PATH")

            if [ -z "$COMMITS" ]; then
              echo "No notable changes." > /tmp/release-notes.md
            else
              echo "## What's Changed" > /tmp/release-notes.md
              echo "" >> /tmp/release-notes.md

              while IFS= read -r SHA; do
                SUBJECT=$(git log -1 --pretty=format:"%s" "$SHA")
                PR_NUM=$(gh api "/repos/${{ github.repository }}/commits/${SHA}/pulls" --jq '.[0].number // empty' 2>/dev/null)

                if [ -n "$PR_NUM" ] && ! echo "$SUBJECT" | grep -qF "(#${PR_NUM})"; then
                  echo "- ${SUBJECT} (#${PR_NUM})" >> /tmp/release-notes.md
                else
                  echo "- ${SUBJECT}" >> /tmp/release-notes.md
                fi
              done <<< "$COMMITS"
            fi
          fi
        working-directory: ${{ github.workspace }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.release.outputs.tag }}"
          TITLE="BrowserOS Extension - v${{ steps.release.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, updating"
            gh release edit "$TAG" --title "$TITLE" --notes-file /tmp/release-notes.md
            gh release upload "$TAG" "${{ steps.artifact.outputs.zip_path }}" --clobber
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md \
              "${{ steps.artifact.outputs.zip_path }}"
          fi
        working-directory: ${{ github.workspace }}

      - name: Update CHANGELOG.md via PR
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.release.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%d")
          BRANCH="docs/agent-extension-changelog-v${VERSION}"
          CHANGELOG="packages/browseros-agent/apps/app/CHANGELOG.md"

          git fetch origin "$DEFAULT_BRANCH" --no-tags
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          {
            head -n 1 "$CHANGELOG"
            echo ""
            echo "## v${VERSION} (${DATE})"
            echo ""
            cat /tmp/release-notes.md
            echo ""
            tail -n +2 "$CHANGELOG"
          } > /tmp/new-changelog.md
          mv /tmp/new-changelog.md "$CHANGELOG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$CHANGELOG"
          git commit -m "docs: update agent extension changelog for v${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "docs: update agent extension changelog for v${VERSION}" \
            --body "Auto-generated changelog update for BrowserOS Extension v${VERSION}." \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH"

          gh pr merge "$BRANCH" --squash --auto || true
        working-directory: ${{ github.workspace }}
