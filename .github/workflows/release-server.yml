name: Release BrowserOS Server

on:
  push:
    tags:
      - "agent-server/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.0.123"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-server
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || github.event.deleted != true
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: Resolve release
        id: release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          SERVER_PACKAGE_JSON="packages/browseros-agent/apps/server/package.json"

          is_semver() {
            [[ "$1" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          }

          read_package_version() {
            python3 - "$SERVER_PACKAGE_JSON" <<'PY'
          import json
          import sys
          from pathlib import Path

          print(json.loads(Path(sys.argv[1]).read_text())["version"])
          PY
          }

          read_package_version_at_ref() {
            git show "$1:$SERVER_PACKAGE_JSON" | python3 -c '
          import json
          import sys

          print(json.load(sys.stdin)["version"])
          '
          }

          compare_versions() {
            python3 - "$1" "$2" <<'PY'
          import sys

          left = tuple(int(part) for part in sys.argv[1].split("."))
          right = tuple(int(part) for part in sys.argv[2].split("."))
          print((left > right) - (left < right))
          PY
          }

          previous_server_tag() {
            python3 - "$1" <<'PY'
          import re
          import subprocess
          import sys

          target = tuple(int(part) for part in sys.argv[1].split("."))
          tags = subprocess.check_output(["git", "tag", "-l"], text=True).splitlines()
          candidates = []

          for tag in tags:
              for prefix in ("agent-server/v", "browseros-server-v"):
                  if not tag.startswith(prefix):
                      continue
                  version = tag[len(prefix):]
                  if not re.fullmatch(r"(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)", version):
                      continue
                  parsed = tuple(int(part) for part in version.split("."))
                  if parsed < target:
                      candidates.append((parsed, tag))

          if candidates:
              print(max(candidates)[1])
          PY
          }

          update_package_version() {
            python3 - "$SERVER_PACKAGE_JSON" "$1" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          version = sys.argv[2]
          data = json.loads(path.read_text())
          data["version"] = version
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY
          }

          require_annotated_tag() {
            local tag="$1"
            local tag_type
            tag_type="$(git cat-file -t "refs/tags/$tag" 2>/dev/null || true)"
            if [ -z "$tag_type" ]; then
              echo "::error::Tag does not exist: $tag"
              exit 1
            fi
            if [ "$tag_type" != "tag" ]; then
              echo "::error::Tag $tag must be an annotated tag."
              exit 1
            fi
          }

          git fetch origin "$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH" --no-tags
          git fetch origin --tags --prune

          if [ "$EVENT_NAME" = "push" ]; then
            TAG="$REF_NAME"
            VERSION="${TAG#agent-server/v}"

            if [ "$TAG" = "$VERSION" ] || ! is_semver "$VERSION"; then
              echo "::error::Expected server release tag like agent-server/vX.Y.Z, got: $TAG"
              exit 1
            fi

            require_annotated_tag "$TAG"
            RELEASE_SHA="$(git rev-list -n 1 "$TAG")"
            PACKAGE_VERSION="$(read_package_version_at_ref "$RELEASE_SHA")"

            if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
              echo "::error::$SERVER_PACKAGE_JSON at $TAG is $PACKAGE_VERSION, expected $VERSION. Bump package.json before tagging."
              exit 1
            fi
          else
            VERSION="$REQUESTED_VERSION"
            if ! is_semver "$VERSION"; then
              echo "::error::Version must be MAJOR.MINOR.PATCH, got: $VERSION"
              exit 1
            fi

            TAG="agent-server/v$VERSION"
            if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
              require_annotated_tag "$TAG"
              RELEASE_SHA="$(git rev-list -n 1 "$TAG")"
              PACKAGE_VERSION="$(read_package_version_at_ref "$RELEASE_SHA")"

              if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
                echo "::error::$SERVER_PACKAGE_JSON at $TAG is $PACKAGE_VERSION, expected $VERSION."
                exit 1
              fi
            else
              git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
              CURRENT_VERSION="$(read_package_version)"

              if [ "$(compare_versions "$VERSION" "$CURRENT_VERSION")" = "-1" ]; then
                echo "::error::Requested server version $VERSION is lower than $SERVER_PACKAGE_JSON ($CURRENT_VERSION)."
                exit 1
              fi

              if [ "$CURRENT_VERSION" != "$VERSION" ]; then
                update_package_version "$VERSION"
                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git add "$SERVER_PACKAGE_JSON"
                git commit -m "chore: bump server version to $VERSION"
                git push origin "HEAD:refs/heads/$DEFAULT_BRANCH"
              fi

              RELEASE_SHA="$(git rev-parse HEAD)"
              git tag -a "$TAG" -m "BrowserOS Server - v$VERSION" "$RELEASE_SHA"
              git push origin "refs/tags/$TAG"
              PACKAGE_VERSION="$VERSION"
            fi
          fi

          PREVIOUS_TAG="$(previous_server_tag "$VERSION")"

          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "release_sha=$RELEASE_SHA"
            echo "previous_tag=$PREVIOUS_TAG"
          } >> "$GITHUB_OUTPUT"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          Server release:
          - Version: $VERSION
          - Tag: $TAG
          - Release commit: $RELEASE_SHA
          - Package path: $SERVER_PACKAGE_JSON
          - Assets: GitHub source archives only
          EOF

      - name: Generate release notes
        env:
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          set -euo pipefail

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "Initial BrowserOS Server release." > /tmp/release-notes.md
          else
            git log "$PREVIOUS_TAG..$RELEASE_SHA" --pretty=format:"- %s (%h)" > /tmp/release-notes.md
            if [ ! -s /tmp/release-notes.md ]; then
              echo "No commits since $PREVIOUS_TAG." > /tmp/release-notes.md
            fi
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          TITLE="BrowserOS Server - v$VERSION"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md
          fi
