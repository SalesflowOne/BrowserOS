ToolEvent:
  type: object
  additionalProperties: false
  required: [name, at]
  properties:
    name:
      type: string
    at:
      type: integer
      format: int64
TabStatus:
  type: string
  enum: [active, idle]
Tab:
  type: object
  additionalProperties: false
  required:
    - tabId
    - pageId
    - targetId
    - slug
    - label
    - url
    - title
    - status
    - firstActivityAt
    - lastActivityAt
    - lastToolName
    - toolCount
    - recentTools
  properties:
    tabId:
      type: integer
      format: int64
    pageId:
      type: integer
      format: int64
    targetId:
      type: string
    sessionId:
      type: string
    profileId:
      type: string
    slug:
      type: string
    label:
      type: string
    harness:
      type: string
    color:
      type: string
    url:
      type: string
    title:
      type: string
    status:
      $ref: '#/TabStatus'
    firstActivityAt:
      type: integer
      format: int64
    lastActivityAt:
      type: integer
      format: int64
    lastToolName:
      type: string
    toolCount:
      type: integer
      format: int64
      minimum: 0
    recentTools:
      type: array
      items:
        $ref: '#/ToolEvent'
    previewCapturedAt:
      type: integer
      format: int64
TabList:
  type: object
  additionalProperties: false
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/Tab'
