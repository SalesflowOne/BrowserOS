get:
  operationId: getRecording
  parameters:
    - $ref: ../parameters.yaml#/SessionId
  responses:
    '200':
      description: Recording metadata, including an empty known recording.
      content:
        application/json:
          schema:
            $ref: ../schemas/sessions.yaml#/RecordingMetadata
    '404':
      $ref: ../responses.yaml#/NotFound
    '500':
      $ref: ../responses.yaml#/InternalError
