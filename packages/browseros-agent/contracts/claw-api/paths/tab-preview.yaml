get:
  operationId: getTabPreview
  parameters:
    - $ref: ../parameters.yaml#/PageId
  responses:
    '200':
      description: Latest cached JPEG frame.
      content:
        image/jpeg:
          schema:
            type: string
            format: binary
    '400':
      $ref: ../responses.yaml#/BadRequest
    '404':
      $ref: ../responses.yaml#/NotFound
    '500':
      $ref: ../responses.yaml#/InternalError
