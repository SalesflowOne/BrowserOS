# BrowserOS Linux Release Build Configuration
#
# Builds x64 on a Linux x64 host. arm64 is temporarily disabled while we
# validate the cross-compile sysroot bootstrap end-to-end — re-enable by
# switching `architecture` back to `[x64, arm64]`.
#
# Run:
#   browseros build --config build/config/release.linux.yaml
#
# Environment Variables:
#   Use !env tag to reference environment variables:
#     Example: chromium_src: !env CHROMIUM_SRC

build:
  type: release
  architecture: x64

gn_flags:
  file: build/config/gn/flags.linux.release.gn

# Explicit module execution order. Runs once per architecture above.
modules:
  # Phase 1: Setup
  - clean
  - git_setup

  # Phase 2: Patches & Resources
  - download_resources
  - resources
  - bundled_extensions
  - chromium_replace
  - string_replaces
  - series_patches
  - patches

  # Phase 3: Build
  - configure
  - compile

  # Phase 4: Package (Linux doesn't require code signing)
  - package_linux

  # Phase 5: Upload
  - upload

# Required environment variables
# Note: CHROMIUM_SRC can be provided via --chromium-src CLI flag, YAML config, or env var
# Linux release builds don't require code signing, only upload

# Notification settings
notifications:
  slack: true
